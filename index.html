    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-a8-blue-v3.png">
    <link rel="shortcut icon" href="/favicon-a8-blue-v3.ico">
    <script>
      // Force favicon refresh when browsers keep an old cached icon.
      (() => {
        const hrefs = ["/favicon-a8-blue-v3.png", "/favicon-a8-blue-v3.ico"];
        document.querySelectorAll("link[rel~='icon'], link[rel='shortcut icon']").forEach((el) => el.remove());
        hrefs.forEach((href) => {
          const link = document.createElement("link");
          link.rel = href.endsWith(".ico") ? "shortcut icon" : "icon";
          link.href = `${href}?v=${Date.now()}`;
          if (href.endsWith(".png")) {
            link.type = "image/png";
            link.sizes = "192x192";
          }
          document.head.appendChild(link);
        });
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>

  </body>
